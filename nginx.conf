server {
    listen 80;
    server_name localhost;

    # Carpeta raíz con los archivos compilados de Angular
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejor rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # -------------------------------------------------------
    # Proxy hacia el backend Spring Boot
    # Todas las rutas /api/* van al backend
    # -------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # -------------------------------------------------------
    # Angular SPA - redirige todo lo demás al index.html
    # Necesario para que funcione el routing de Angular
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (imágenes, fuentes, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
