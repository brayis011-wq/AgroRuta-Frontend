<div class="container">
  <div class="header">
    <div>
      <h2>🌱 Nueva Siembra</h2>
      <p class="subtitle">Registra una siembra en el lote</p>
    </div>
    <button class="btn-secondary" (click)="cancelar()">← Volver</button>
  </div>

  <div class="form-card">
    <form (ngSubmit)="registrar()">

      <div class="form-group">
        <label for="fechaSiembra">Fecha de siembra *</label>
        <input id="fechaSiembra" type="date" [(ngModel)]="form.fechaSiembra"
               name="fechaSiembra" required />
      </div>

      <div class="form-group">
        <label for="cantidadPlantas">Cantidad de plantas *</label>
        <input id="cantidadPlantas" type="number" [(ngModel)]="form.cantidadPlantas"
               name="cantidadPlantas" placeholder="Ej: 500" min="1" required />
      </div>

      <div class="form-group">
        <label for="variedad">Variedad de uchuva *</label>
        <select id="variedad" [(ngModel)]="form.variedad" name="variedad" required>
          <option value="">Selecciona una variedad</option>
          <option value="COLOMBIA">Colombia</option>
          <option value="GIGANTE">Gigante</option>
          <option value="KENYA">Kenya</option>
        </select>
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>
      <div class="success" *ngIf="exito">¡Siembra registrada exitosamente!</div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="guardando">
          {{ guardando ? 'Guardando...' : 'Registrar Siembra' }}
        </button>
      </div>

    </form>
  </div>
</div>
