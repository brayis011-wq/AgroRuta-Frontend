<div class="container">
  <div class="header">
    <div>
      <h2>🏡 Nueva Finca</h2>
      <p class="subtitle">Registra una nueva finca de uchuva</p>
    </div>
    <button class="btn-secondary" (click)="cancelar()">← Volver</button>
  </div>

  <div class="form-card">
    <form (ngSubmit)="registrar()">

      <div class="form-group">
        <label for="nombre">Nombre de la finca *</label>
        <input id="nombre" type="text" [(ngModel)]="form.nombre"
               name="nombre" placeholder="Ej: Finca El Paraíso" required />
      </div>

      <div class="form-group">
        <label for="ubicacion">Ubicación *</label>
        <input id="ubicacion" type="text" [(ngModel)]="form.ubicacion"
               name="ubicacion" placeholder="Ej: Vereda La Esperanza, Cundinamarca" required />
      </div>

      <div class="form-group">
        <label for="hectareas">Hectáreas *</label>
        <input id="hectareas" type="number" [(ngModel)]="form.hectareas"
               name="hectareas" placeholder="Ej: 2.5" step="0.1" min="0.1" required />
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>


      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="guardando">
          {{ guardando ? 'Guardando...' : 'Registrar Finca' }}
        </button>
      </div>

    </form>
  </div>
</div>
