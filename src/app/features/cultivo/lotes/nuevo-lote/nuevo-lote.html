<div class="container">
  <div class="header">
    <div>
      <h2>🌿 Nuevo Lote</h2>
      <p class="subtitle">Registra un lote dentro de la finca</p>
    </div>
    <button class="btn-secondary" (click)="cancelar()">← Volver</button>
  </div>

  <div class="form-card">
    <form (ngSubmit)="registrar()">

      <div class="form-group">
        <label for="nombre">Nombre del lote *</label>
        <input id="nombre" type="text" [(ngModel)]="form.nombre"
               name="nombre" placeholder="Ej: Lote A" required />
      </div>

      <div class="form-group">
        <label for="area">Área (hectáreas) *</label>
        <input id="area" type="number" [(ngModel)]="form.area"
               name="area" placeholder="Ej: 0.5" step="0.1" min="0.1"
               [max]="hectareasFinca ?? null" required />
        <small *ngIf="hectareasFinca" style="color: #6b7280; margin-top: 4px; display: block;">
          Máximo permitido: {{ hectareasFinca }} ha (límite de la finca)
        </small>
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>
      <div class="success" *ngIf="exito">¡Lote registrado exitosamente!</div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="guardando">
          {{ guardando ? 'Guardando...' : 'Registrar Lote' }}
        </button>
      </div>

    </form>
  </div>
</div>
