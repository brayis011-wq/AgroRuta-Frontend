<div class="container">
  <div class="card">
    <h2>AgroRuta</h2>
    <h3>Iniciar sesión</h3>

    <div class="error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Correo electrónico</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          placeholder="tu@email.com"
          required
        />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="form.password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>
    <p class="link">¿No tienes cuenta? <a routerLink="/auth/registro">Regístrate</a></p>
  </div>
</div>
